<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c0392b">
  <title>Gestión TI — Alcaldía de Nemocón</title>

  <!-- CSS modular -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/buttons.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/main.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png">
</head>
<body>

  <!-- HEADER -->
  <header id="app-header"></header>

  <!-- MENÚ LATERAL -->
  <nav id="app-menu"></nav>
  <div id="menu-overlay" class="menu-overlay"></div>

  <!-- CONTENEDOR PRINCIPAL -->
<main id="app-main">
  <!-- Las páginas se inyectan aquí dinámicamente -->
</main>

<!-- LOADER -->
<div id="page-loader" class="page-loader">
  <div style="text-align:center;">
    <div style="font-size:32px;margin-bottom:12px;">🏛️</div>
    <div style="font-weight:700;font-size:16px;color:var(--text1);margin-bottom:4px;">
      Gestión TI
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:20px;">
      Alcaldía Municipal de Nemocón
    </div>
    <div class="loader-spinner"></div>
    <div style="font-size:11px;color:var(--text3);margin-top:12px;">
      Cargando datos...
    </div>
  </div>
</div>
  <!-- TOAST NOTIFICATIONS -->
  <div id="toast-container"></div>

  <!-- MODALES (se inyectan desde cada módulo) -->
  <div id="modals-container"></div>

  <!-- VISOR DE DOCUMENTOS -->
  <div id="doc-viewer-overlay">
    <div id="doc-viewer-toolbar">
      <div id="doc-viewer-title">Documento</div>
      <button id="doc-viewer-firmar-btn" style="display:none;background:#16a34a;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-family:var(--font-main);font-size:12px;cursor:pointer;"
              onclick="window._docFirmarCallback?.()">
        Firmar acta
      </button>
      <button onclick="docViewerPrint()">🖨️ Imprimir</button>
      <button onclick="cerrarDocViewer()">✕ Cerrar</button>
    </div>
    <iframe id="doc-viewer-iframe" title="Vista previa"></iframe>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="cerrarLightbox()">
    <button class="lightbox-close" onclick="cerrarLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="foto">
    <div id="lightbox-counter"></div>
  </div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div id="confirm-icon" class="confirm-icon"></div>
      <div id="confirm-title" class="confirm-title"></div>
      <p id="confirm-msg" class="confirm-msg"></p>
      <div class="confirm-btns">
        <button id="confirm-cancel-btn" onclick="cerrarConfirm()">Cancelar</button>
        <button id="confirm-ok-btn">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button id="fab-btn" class="fab" onclick="fabAction()">＋</button>

  <!-- Config global -->
  <script src="js/config-global.js"></script>

  <!-- Entry point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
